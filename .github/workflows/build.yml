name: Flatpak CI — Submission

on:
  pull_request:
    branches: [new-sub]
    paths:
      - "apps/**"

jobs:
  # ── Detect which apps changed ─────────────────────────────────────────────
  detect:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      changed_manifests: ${{ steps.diff.outputs.manifests }}
      has_changes: ${{ steps.diff.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find changed manifests
        id: diff
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}

          # Find flatpak manifests in apps/ that changed (exclude metadata.yaml)
          MANIFESTS=$(git diff --name-only "$BASE" "$HEAD" \
            | grep -E '^apps/[^/]+/[^/]+\.(json|yaml|yml)$' \
            | grep -v '/metadata\.yaml$' \
            | head -10 \
            || true)

          if [ -z "$MANIFESTS" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "manifests=[]" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            JSON=$(echo "$MANIFESTS" | jq -Rsc 'split("\n") | map(select(. != ""))')
            echo "manifests=$JSON" >> "$GITHUB_OUTPUT"
          fi

  # ── Source compliance check ───────────────────────────────────────────────
  check-sources:
    name: Check sources ${{ matrix.manifest }}
    needs: detect
    if: needs.detect.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        manifest: ${{ fromJson(needs.detect.outputs.changed_manifests) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run source compliance check
        run: python .github/scripts/check-sources.py "${{ matrix.manifest }}"

  # ── Build and lint each changed app ───────────────────────────────────────
  build:
    name: Build ${{ matrix.manifest }}
    needs: [detect, check-sources]
    if: needs.detect.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        manifest: ${{ fromJson(needs.detect.outputs.changed_manifests) }}

    container:
      image: ghcr.io/flathub/flatpak-builder:latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract App ID from manifest path
        id: app
        run: |
          MANIFEST="${{ matrix.manifest }}"
          APP_ID=$(basename "$(dirname "$MANIFEST")")
          echo "id=$APP_ID" >> "$GITHUB_OUTPUT"
          echo "manifest=$MANIFEST" >> "$GITHUB_OUTPUT"

      - name: Add Flathub remote (for SDK dependencies)
        run: |
          flatpak remote-add --if-not-exists flathub \
            https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Lint manifest
        run: |
          flatpak-builder-lint --exceptions manifest \
            "${{ steps.app.outputs.manifest }}" || true

      - name: Build Flatpak
        run: |
          flatpak-builder \
            --force-clean \
            --sandbox \
            --user \
            --install-deps-from=flathub \
            --repo=/tmp/build-repo \
            --disable-rofiles-fuse \
            /tmp/build-dir \
            "${{ steps.app.outputs.manifest }}"

      - name: Validate AppStream metadata
        run: |
          METAINFO_DIR="$(dirname '${{ steps.app.outputs.manifest }}')"
          METAINFO=$(find "$METAINFO_DIR" -name "*.metainfo.xml" | head -1 || true)
          if [ -n "$METAINFO" ]; then
            appstreamcli validate "$METAINFO" || true
          else
            echo "::warning::No metainfo.xml found for ${{ steps.app.outputs.id }}"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.app.outputs.id }}-repo
          path: /tmp/build-repo/
          retention-days: 7
