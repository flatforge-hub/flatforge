# Anonymize IP addresses in logs: zero the last octet of IPv4, keep /48 of IPv6.
# Anonymized addresses are not personal data under GDPR.
map $remote_addr $anonymized_addr {
    ~(?P<ip>\d+\.\d+\.\d+)\.    $ip.0;
    ~(?P<ip>[^:]+:[^:]+:[^:]+)  $ip::;
    default                      0.0.0.0;
}
log_format anonymized '$anonymized_addr - $remote_user [$time_local] '
                       '"$request" $status $body_bytes_sent '
                       '"$http_referer" "$http_user_agent"';
access_log /var/log/nginx/access.log anonymized;

gzip on;
gzip_types text/plain text/css application/javascript application/json
           application/xml image/svg+xml application/wasm;
gzip_comp_level 6;
gzip_min_length 256;

# Trust Cloudflare IP ranges for real client IP
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header X-Forwarded-For;

server {
    listen 80;
    server_name _;

    # ── React SPA ──────────────────────────────────────────────────────────
    root /srv/web;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=3600";
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
    }

    # Static assets (Vite fingerprinted bundles) — long-lived cache
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|gif|svg|ico|webp)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── OSTree / Flatpak repository ────────────────────────────────────────
    location /repo/ {
        alias /srv/ostree/;
        autoindex off;

        # Disable range requests for OSTree (not needed, avoids edge cases)
        add_header Accept-Ranges none;

        # Summary and signature change on every publish — never cache
        location ~* /repo/(summary|summary\.sig|config|refs/.*)$ {
            alias /srv/ostree/;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            expires 0;
        }

        # Content-addressed objects are immutable once written
        location ~* /repo/objects/ {
            alias /srv/ostree/objects/;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
        }

        # Default for other repo files
        add_header Cache-Control "public, max-age=300";
    }

    # Serve .flatpakrepo subscription file (lives inside the OSTree repo dir)
    location = /flatforge.flatpakrepo {
        alias /srv/ostree/flatforge.flatpakrepo;
        add_header Content-Type "application/octet-stream";
        add_header Cache-Control "public, max-age=3600";
    }

    # Health check endpoint
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
